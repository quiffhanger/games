<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0b1026" />
    <title>Games</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="hub">
      <h1 class="hub__title">Games</h1>
      <p class="hub__subtitle">Tap a game to play</p>

      <ul class="tiles">
        <li>
          <a class="tile tile--pacman" href="./games/pacman/">
            <span class="tile__art" aria-hidden="true">
              <span class="pac"></span>
            </span>
            <span class="tile__label">Pac-Man</span>
          </a>
        </li>
        <li>
          <a class="tile tile--piano" href="./games/piano-tiles/">
            <span class="tile__art tile__art--piano" aria-hidden="true">
              <span class="piano-keys">
                <span class="piano-key" style="background:#ff77c6"></span>
                <span class="piano-key" style="background:#ffd600"></span>
                <span class="piano-key" style="background:#4fe3ff"></span>
                <span class="piano-key" style="background:#8aff80"></span>
              </span>
            </span>
            <span class="tile__label">Piano Tiles</span>
          </a>
        </li>
        <li>
          <a class="tile tile--colouring" href="./games/colouring/">
            <span class="tile__art tile__art--palette" aria-hidden="true">
              <span class="palette">
                <span class="palette-dot" style="background:#f44336"></span>
                <span class="palette-dot" style="background:#ffeb3b"></span>
                <span class="palette-dot" style="background:#4caf50"></span>
                <span class="palette-dot" style="background:#2196f3"></span>
                <span class="palette-dot" style="background:#9c27b0"></span>
                <span class="palette-dot" style="background:#ff9800"></span>
              </span>
            </span>
            <span class="tile__label">Colouring</span>
          </a>
        </li>
        <li>
          <a class="tile tile--snake" href="./games/snake/">
            <span class="tile__art tile__art--snake" aria-hidden="true">
              <span class="snake-icon">
                <span class="snake-icon__seg"></span>
                <span class="snake-icon__seg"></span>
                <span class="snake-icon__seg"></span>
                <span class="snake-icon__food"></span>
                <span></span>
                <span></span>
                <span class="snake-icon__seg"></span>
                <span></span>
                <span></span>
                <span></span>
                <span class="snake-icon__seg snake-icon__seg--head"></span>
                <span></span>
                <span></span>
                <span class="snake-icon__seg"></span>
                <span class="snake-icon__seg"></span>
                <span></span>
              </span>
            </span>
            <span class="tile__label">Snake</span>
          </a>
        </li>
        <li>
          <a class="tile tile--school-run" href="./games/school-run/">
            <span class="tile__art tile__art--runner" aria-hidden="true">
              <span class="runner"></span>
            </span>
            <span class="tile__label">School Run</span>
          </a>
        </li>
      </ul>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
