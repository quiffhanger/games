<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0b1026" />
    <title>Pac-Man</title>
    <link rel="manifest" href="../../manifest.webmanifest" />
    <link rel="icon" href="../../icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="../../icons/icon-192.png" />
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="stylesheet" href="./pacman.css" />
  </head>
  <body class="pacman-body">
    <header class="pac-header">
      <a class="pac-back" href="../../" aria-label="Back to games">&larr;</a>
      <div class="pac-scores">
        <span class="pac-score">
          <span class="pac-score__label">Dots</span>
          <span class="pac-score__value" id="score">0</span>
        </span>
        <span class="pac-score">
          <span class="pac-score__label">Best</span>
          <span class="pac-score__value" id="best">0</span>
        </span>
      </div>
    </header>

    <main class="pac-main">
      <!-- Landscape: up/down/left cluster to the left of the maze. -->
      <div class="dpad dpad--land dpad--land-left" aria-label="Left controls">
        <button class="dpad__btn dpad__land-up" data-dir="up" aria-label="Up">
          &#9650;
        </button>
        <button class="dpad__btn dpad__land-down" data-dir="down" aria-label="Down">
          &#9660;
        </button>
        <button class="dpad__btn dpad__land-side" data-dir="left" aria-label="Left">
          &#9664;
        </button>
      </div>

      <div class="pac-stage">
        <canvas id="game" width="600" height="520"></canvas>
        <div class="pac-win" id="win" hidden>
          <div class="pac-win__card">
            <div class="pac-win__title">Yay! You did it! 🎉</div>
            <button class="pac-win__btn" id="again" type="button">
              Play Again
            </button>
          </div>
        </div>
      </div>

      <!-- Landscape: up/down/right cluster to the right of the maze. -->
      <div class="dpad dpad--land dpad--land-right" aria-label="Right controls">
        <button class="dpad__btn dpad__land-up" data-dir="up" aria-label="Up">
          &#9650;
        </button>
        <button class="dpad__btn dpad__land-down" data-dir="down" aria-label="Down">
          &#9660;
        </button>
        <button class="dpad__btn dpad__land-side" data-dir="right" aria-label="Right">
          &#9654;
        </button>
      </div>

      <!-- Portrait: single traditional d-pad below the maze. -->
      <div class="dpad dpad--port" aria-label="Direction pad">
        <button class="dpad__btn dpad__btn--up" data-dir="up" aria-label="Up">
          &#9650;
        </button>
        <button
          class="dpad__btn dpad__btn--left"
          data-dir="left"
          aria-label="Left"
        >
          &#9664;
        </button>
        <button
          class="dpad__btn dpad__btn--right"
          data-dir="right"
          aria-label="Right"
        >
          &#9654;
        </button>
        <button
          class="dpad__btn dpad__btn--down"
          data-dir="down"
          aria-label="Down"
        >
          &#9660;
        </button>
      </div>
    </main>

    <script type="module" src="./pacman.js"></script>
  </body>
</html>
