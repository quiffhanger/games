<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0b1026" />
    <title>Security Invaders</title>
    <link rel="manifest" href="../../manifest.webmanifest" />
    <link rel="icon" href="../../icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="../../icons/icon-192.png" />
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="stylesheet" href="./space-invaders.css" />
  </head>
  <body class="si-body">
    <header class="si-header">
      <a class="pac-back" href="../../" aria-label="Back to games">&larr;</a>
      <div class="si-quarter" id="quarter">Q1 FY27</div>
      <div class="si-score-wrap">
        <span class="pac-score">
          <span class="pac-score__label">Score</span>
          <span class="pac-score__value" id="score">0</span>
        </span>
        <span class="pac-score">
          <span class="pac-score__label">Lives</span>
          <span class="pac-score__value" id="lives">3</span>
        </span>
      </div>
    </header>

    <main class="si-main">
      <div class="si-stage">
        <canvas id="game"></canvas>
        <div class="si-touch" id="touch" aria-hidden="true">
          <button class="si-pad si-pad--left" id="btn-left" aria-label="Move left">&larr;</button>
          <button class="si-pad si-pad--fire" id="btn-fire" aria-label="Fire">FIRE</button>
          <button class="si-pad si-pad--right" id="btn-right" aria-label="Move right">&rarr;</button>
        </div>
        <div class="pac-win" id="gameover" hidden>
          <div class="pac-win__card">
            <div class="pac-win__title" id="gameover-title">Game Over</div>
            <div class="si-final" id="gameover-msg"></div>
            <button class="pac-win__btn" id="again" type="button">
              Play Again
            </button>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="./space-invaders.js"></script>
  </body>
</html>
